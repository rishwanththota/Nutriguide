<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | NutriGuide</title>
  <style>
    body { font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
    h1 { color: #27ae60; margin-bottom: 25px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #2ecc71; color: #fff; cursor: pointer; transition: 0.3s; }
    button:hover { background: #27ae60; }
    .link { display: block; margin-top: 15px; color: #27ae60; text-decoration: none; font-size: 0.9em; }
    .link:hover { text-decoration: underline; }
    footer { position: absolute; bottom: 10px; text-align: center; font-size: 0.85em; color: #fff; width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Forgot Password</h1>
    <form id="forgotForm">
      <input type="email" id="email" placeholder="Enter your email" required />
      <button type="submit">Reset Password</button>
    </form>
    <a href="login.html" class="link">Back to Login</a>
  </div>
  <footer>&copy; 2025 NutriGuide. All rights reserved.</footer>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value;
      if(email){
        alert(`Password reset link sent to ${email} (demo only).`);
        window.location.href = 'login.html';
      } else {
        alert('Please enter your email.');
      }
    });
  </script>
</body>
</html>
