<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | NutriGuide</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #f9fafb;
      color: #333;
    }
    /* Navbar */
  .navbar {
    background-color: #2e7d32;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .navbar h1 {
    margin: 0;
    font-size: 24px;
  }

  .navbar a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: 500;
  }

  .navbar a:hover {
    text-decoration: underline;
  }

    header {
      background-color: #27ae60;
      padding: 20px 0;
      text-align: center;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 2em;
    }

    .contact-container {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .contact-container h2 {
      text-align: center;
      color: #27ae60;
      margin-bottom: 25px;
    }

    .contact-container form {
      display: flex;
      flex-direction: column;
    }

    .contact-container input,
    .contact-container textarea {
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1em;
      resize: vertical;
    }

    .contact-container button {
      padding: 12px;
      background-color: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      transition: 0.3s;
    }

    .contact-container button:hover {
      background-color: #27ae60;
    }

    footer {
      text-align: center;
      padding: 15px 0;
      margin-top: 40px;
      background: #27ae60;
      color: white;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <h1>🌿 NutriGuide </h1>
    <div>
      <nav>
 <a href="dashboard.html">Dashboard</a>
 <a href="caluclator.html">Tracker</a>
 <a href="mealplan.html">Meal Plan</a>
 <a href="about.html">About</a>
 <a href="contact.html">Contact</a>
 <a href="logout.html">Logout</a>
</nav>

    </div>
  </div>
  

  <div class="contact-container">
    <h2>Contact Us</h2>
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="email" id="email" placeholder="Your Email" required />
      <input type="text" id="subject" placeholder="Subject" required />
      <textarea id="message" placeholder="Your Message" rows="6" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    <div class="contact-icons">
      <link rel="stylesheet" href="style.css">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <h2>Connect with Nutriguide</h2>
    <div class="icons">
      <a href="#" class="icon instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" class="icon facebook"><i class="fab fa-facebook"></i></a>
      <a href="#" class="icon linkedin"><i class="fab fa-linkedin"></i></a>
      <a href="mailto:nutriguide@gmail.com" class="icon gmail"><i class="fas fa-envelope"></i></a>
      <a href="https://wa.me/919876543210" class="icon whatsapp"><i class="fab fa-whatsapp"></i></a>
    </div>
  </div>
  </footer>

</body>
</html>
