<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout | NutriGuide</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f9fafb;
      color: #333;
    }

    .logout-container {
      text-align: center;
      background-color: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #27ae60;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1em;
      color: #555;
      margin-bottom: 30px;
    }

    .btn {
      background-color: #2ecc71;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: background-color 0.3s ease;
      text-decoration: none;
    }

    .btn:hover {
      background-color: #27ae60;
    }

    footer {
      position: absolute;
      bottom: 10px;
      text-align: center;
      font-size: 0.9em;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="logout-container">
    <h1>You're Logged Out</h1>
    <p>Thank you for using <strong>NutriGuide</strong>!<br>
    You have been successfully logged out of your account.</p>
    <a href="login.html" class="btn">Login Again</a>
  </div>

  <footer>
    <p>&copy; 2025 NutriGuide. All rights reserved.</p>
  </footer>

  <!-- Optional JavaScript (for real logout handling) -->
  <script>
    // Example: Clear user session/local storage before showing logout page
    localStorage.clear();
    sessionStorage.clear();

    // You could also add an API call to invalidate the session token
    // fetch('/api/logout', { method: 'POST', credentials: 'include' });
  </script>

</body>
</html>
