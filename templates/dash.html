<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriGuide Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f6f8;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #27ae60;
      height: 100vh;
      color: #fff;
      padding: 30px 20px;
      position: fixed;
    }

    .sidebar h2 {
      margin-top: 0;
      text-align: center;
      font-size: 26px;
      letter-spacing: 1px;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 12px 15px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 16px;
      transition: 0.3s;
    }

    .sidebar a:hover {
      background: #219150;
    }

    /* Main content */
    .main {
      margin-left: 270px;
      padding: 30px;
      width: 100%;
    }

    .header {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      color: #27ae60;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .card h3 {
      color: #27ae60;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 18px;
      font-weight: bold;
    }

    /* Button */
    .btn {
      padding: 12px 20px;
      border: none;
      background: #27ae60;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #219150;
    }

  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>NutriGuide</h2>
    
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/tracker">📊 Daily Tracker</a>
    <a href="#">🍎 Meal Plans</a>
    <a href="#">🥗 Nutrition Scanner</a>
    <a href="#">👤 Profile</a>
    <a href="/login">🚪 Logout</a>
  </div>

  <!-- Main Section -->
  <div class="main">

    <div class="header">
      <h1>Welcome to Your Dashboard</h1>
      <p style="color:#555;">Stay healthy with NutriGuide</p>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Today's Calories</h3>
        <p>1,240 / 2,000 kcal</p>
        <button class="btn" onclick="location.href='/tracker'">Update</button>
      </div>

      <div class="card">
        <h3>Water Intake</h3>
        <p>1.5 L / 3 L</p>
        <button class="btn" onclick="location.href='/tracker'">Update</button>
      </div>

      <div class="card">
        <h3>Meals Logged</h3>
        <p>4 meals</p>
        <button class="btn" onclick="location.href='/tracker'">Add Meal</button>
      </div>

      <div class="card">
        <h3>Weekly Progress</h3>
        <p>74% Goal Achieved</p>
        <button class="btn">View Report</button>
      </div>
    </div>

  </div>
</body>
</html>
