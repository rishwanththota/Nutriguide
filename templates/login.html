<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | NutriGuide</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #333;
    }
    .container {
      background: #fff; padding: 40px; border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1); width: 350px;
      text-align: center;
    }
    h1 { color: #27ae60; margin-bottom: 25px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #2ecc71; color: white; cursor: pointer; transition: 0.3s; }
    button:hover { background: #27ae60; }
    .link { display: block; margin-top: 15px; color: #27ae60; text-decoration: none; font-size: 0.9em; }
    .link:hover { text-decoration: underline; }
    footer { position: absolute; bottom: 10px; text-align: center; font-size: 0.85em; color: #fff; width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NutriGuide Login</h1>
    <form action="/login" method="POST">
      <input type="email" name="email" placeholder="Email Address" required />
      <input type="password" name="password" placeholder="Password" required />
      <a href="dashboard.html">
      <button type="submit">Login</button></a>
    </form>

    <a href="forgot-password.html" class="link">Forgot Password?</a>
    <a href="register.html" class="link">Don't have an account? Sign Up</a>
  </div>

  <footer>&copy; 2025 NutriGuide. All rights reserved.</footer>
</body>
</html>
